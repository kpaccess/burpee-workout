<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="32" cy="8" r="5" fill="#FF3366"/>
  <!-- Body -->
  <line x1="32" y1="13" x2="32" y2="34" stroke="#FF3366" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left arm raised -->
  <line x1="32" y1="18" x2="18" y2="9" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm raised -->
  <line x1="32" y1="18" x2="46" y2="9" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
  <!-- Left leg (bent, jumping) -->
  <line x1="32" y1="34" x2="22" y2="46" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
  <line x1="22" y1="46" x2="26" y2="56" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
  <!-- Right leg (bent, jumping) -->
  <line x1="32" y1="34" x2="42" y2="46" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="46" x2="38" y2="56" stroke="#FF3366" stroke-width="3" stroke-linecap="round"/>
</svg>
